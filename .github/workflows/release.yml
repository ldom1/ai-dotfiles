name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog from commits
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | sed -n '2p')
          if [[ -z "$PREV_TAG" ]]; then
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..HEAD"
          fi
          NOTES=$(git log "$RANGE" --pretty=format:"- %s" --no-merges)
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## What's changed

            ${{ steps.changelog.outputs.notes }}

            ---
            **Install skills**
            ```
            /plugin install brain-sync@ldom1/ai-dotfiles
            /plugin install brain-load@ldom1/ai-dotfiles
            /plugin install notion-brain-sync@ldom1/ai-dotfiles
            /plugin install graphify@ldom1/ai-dotfiles
            /plugin install token-watch@ldom1/ai-dotfiles
            /plugin install token-guard@ldom1/ai-dotfiles
            /plugin install finops-audit@ldom1/ai-dotfiles
            /plugin install create-pr@ldom1/ai-dotfiles
            ```
          generate_release_notes: false
