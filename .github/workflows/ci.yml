name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  shellcheck:
    name: Shell scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Lint all shell scripts
        run: |
          find . \
            -not -path './.git/*' \
            -not -path './.claude/plugins/*' \
            -not -path './.claude/session-env/*' \
            -not -path './.claude/shell-snapshots/*' \
            -not -path './.cursor/plugins/*' \
            -name '*.sh' \
            -print0 \
          | xargs -0 shellcheck --severity=warning

  validate-json:
    name: JSON files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON
        run: |
          find . \
            -not -path './.git/*' \
            -name '*.json' \
            -not -name 'package-lock.json' \
            -print0 \
          | xargs -0 -I{} python3 -c "
          import json, sys
          path = '{}'
          try:
              json.load(open(path))
          except json.JSONDecodeError as e:
              print(f'FAIL: {path}: {e}', file=sys.stderr)
              sys.exit(1)
          print(f'OK: {path}')
          "

  validate-skills:
    name: Skill structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Every skill has SKILL.md and plugin.json
        run: |
          fail=0
          for skill_dir in skills/*/; do
            name=$(basename "$skill_dir")
            [[ "$name" == .* ]] && continue
            if [[ ! -f "$skill_dir/SKILL.md" ]]; then
              echo "FAIL: $skill_dir missing SKILL.md" >&2
              fail=1
            fi
            if [[ ! -f "$skill_dir/.claude-plugin/plugin.json" ]]; then
              echo "FAIL: $skill_dir missing .claude-plugin/plugin.json" >&2
              fail=1
            fi
          done
          exit $fail
      - name: git-commit scopes.json has no duplicate entries
        run: |
          python3 - <<'PY'
          import json, sys
          from pathlib import Path
          data = json.loads(Path("skills/git-commit/scopes.json").read_text())
          fail = False
          for ptype, cfg in data.get("project_types", {}).items():
              for key in ("detect", "scopes"):
                  items = cfg.get(key, [])
                  seen = set()
                  for item in items:
                      if item in seen:
                          print(f"FAIL: duplicate {key!r} {item!r} in project type {ptype!r}", file=sys.stderr)
                          fail = True
                      seen.add(item)
          if fail:
              sys.exit(1)
          print("OK: skills/git-commit/scopes.json")
          PY
      - name: Shared skills are symlinked in Claude and Cursor
        run: |
          fail=0
          for skill_dir in skills/*/; do
            name=$(basename "$skill_dir")
            [[ "$name" == coe-* ]] && continue
            [[ -f "$skill_dir/SKILL.md" ]] || continue
            for target in .claude/skills/"$name" .cursor/skills/"$name"; do
              if [[ ! -L "$target" ]]; then
                echo "FAIL: $target is not a symlink to skills/$name" >&2
                fail=1
                continue
              fi
              resolved=$(readlink -f "$target")
              expected=$(readlink -f "$skill_dir")
              if [[ "$resolved" != "$expected" ]]; then
                echo "FAIL: $target -> $resolved (expected $expected)" >&2
                fail=1
              fi
            done
          done
          exit $fail
