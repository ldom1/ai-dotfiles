name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  changes:
    name: Path filter
    runs-on: ubuntu-latest
    outputs:
      wiki: ${{ steps.filter.outputs.wiki }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            wiki:
              - 'docs/wiki/**'
              - 'scripts/update-wiki.sh'
              - '.pre-commit-config.yaml'
              - '.github/workflows/ci.yml'

  shellcheck:
    name: Shell scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Lint all shell scripts
        run: |
          find . \
            -not -path './.git/*' \
            -not -path './.claude/plugins/*' \
            -not -path './.claude/session-env/*' \
            -not -path './.claude/shell-snapshots/*' \
            -not -path './.cursor/plugins/*' \
            -name '*.sh' \
            -print0 \
          | xargs -0 shellcheck --severity=warning

  validate-json:
    name: JSON files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON
        run: |
          find . \
            -not -path './.git/*' \
            -name '*.json' \
            -not -name 'package-lock.json' \
            -print0 \
          | xargs -0 -I{} python3 -c "
          import json, sys
          path = '{}'
          try:
              json.load(open(path))
          except json.JSONDecodeError as e:
              print(f'FAIL: {path}: {e}', file=sys.stderr)
              sys.exit(1)
          print(f'OK: {path}')
          "

  validate-skills:
    name: Skill structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Every skill has SKILL.md and plugin.json
        run: |
          fail=0
          for skill_dir in skills/*/; do
            name=$(basename "$skill_dir")
            [[ "$name" == .* ]] && continue
            if [[ ! -f "$skill_dir/SKILL.md" ]]; then
              echo "FAIL: $skill_dir missing SKILL.md" >&2
              fail=1
            fi
            if [[ ! -f "$skill_dir/.claude-plugin/plugin.json" ]]; then
              echo "FAIL: $skill_dir missing .claude-plugin/plugin.json" >&2
              fail=1
            fi
          done
          exit $fail

  wiki-sync:
    name: Publish wiki
    needs: [changes, shellcheck, validate-json, validate-skills]
    runs-on: ubuntu-latest
    if: >
      github.ref == 'refs/heads/main' &&
      (
        (github.event_name == 'push' && needs.changes.outputs.wiki == 'true') ||
        github.event_name == 'workflow_dispatch'
      )
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pre-commit
        run: pip install -r requirements-dev.txt

      - name: Sync docs/wiki to GitHub wiki
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WIKI_PUSH_TOKEN: ${{ secrets.WIKI_PUSH_TOKEN }}
        run: |
          if [ -z "${WIKI_PUSH_TOKEN:-}" ]; then
            echo "::notice::WIKI_PUSH_TOKEN is empty — using GITHUB_TOKEN. If push fails, add a repo secret WIKI_PUSH_TOKEN (classic PAT: repo scope) or enable Workflow permissions → Read and write in repo Settings → Actions → General."
          fi
          pre-commit run update-wiki --hook-stage manual --all-files
